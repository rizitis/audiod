# /etc/audiod/stack.conf  --  the ordered PipeWire service stack.
#
# Read by BOTH audiod (to start/stop) and audioctl (to control). One source
# of truth: change the order or add a service here and both tools follow.
#
# Fields (whitespace-separated):
#   name    binary               ready
#
#   name   : the daemon(1) --name used for the libslack supervisor + pidfile.
#   binary : absolute path to the executable.
#   ready  : readiness gate to satisfy BEFORE starting the next line.
#            socket:<n>  wait for $XDG_RUNTIME_DIR/<n> to appear.
#            -           no wait.
#
# The D-Bus session bus is NOT listed here; it is handled separately by audiod
# (see MANAGE_DBUS in audiod.conf) because it is conditional infrastructure,
# not a peer service.
#
# name            binary                    ready
pipewire          /usr/bin/pipewire         socket:pipewire-0
wireplumber       /usr/bin/wireplumber      -
pipewire-pulse    /usr/bin/pipewire-pulse   -
