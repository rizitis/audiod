# /etc/audiod/audiod.conf  --  configuration for audiod (the audio session manager)
#
# Simple KEY=value shell syntax. This file is sourced by audiod and audioctl.

# Which audio server this system uses.
#   auto     - detect from /etc/pulse/client.conf (PipeWire when pulseaudio
#              autospawn is off, or when pulseaudio is not installed).
#   pipewire - force PipeWire management on.
#   pulse    - force off; audiod stays idle and audioctl refuses. Use this
#              (or Patrick's pipewire-disable.sh, which auto sets it) to go
#              back to PulseAudio without uninstalling anything.
AUDIO_SERVER=auto

# Manage a per-user D-Bus *session* bus. Desktops (SDDM+Plasma, XFCE, ...)
# start their own via dbus-run-session, and audiod always detects and reuses
# an existing bus wherever it lives (including the /tmp one desktops use) --
# elogind does not track the bus, so audiod inspects the session environment.
#   no  - never spawn one (default). Desktops provide their own; a pure console
#         login runs PipeWire without a session bus, which is fine for basic
#         playback. Recommended for desktop systems (no redundant bus).
#   yes - if, after a short wait, no bus has appeared, spawn one at
#         $XDG_RUNTIME_DIR/bus. Use on console/bare-WM setups that want a
#         session bus for full desktop-less integration.
MANAGE_DBUS=no

# When MANAGE_DBUS=yes: seconds to wait for a concurrently-starting desktop
# bus to appear before spawning our own (avoids a redundant second bus).
BUS_WAIT=3

# Verbose logging to syslog (tag: audiod), and to stderr in foreground.
DEBUG=no

# Seconds to wait, at UserNew, for a valid local seat session to appear
# before deciding the login is not seated (SSH/cron/background -> skipped).
SEAT_WAIT=5

# Seconds to wait for the PipeWire socket to appear before starting the
# services that depend on it (WirePlumber, pipewire-pulse).
PIPEWIRE_WAIT=10

# =========================================================================
#  PARTY HUB MODE  (optional; all OFF by default -> build-7 behaviour)
# =========================================================================
# Turn this box into an audio hub: phones pair and play through it, trusted
# LAN machines can stream to it, and playback can mirror to several outputs.
# Everything below is inert unless HUB_MODE=yes.
#
#  SECURITY: hub mode opens the box up on purpose. Bluetooth pairing is only
#  offered in a short window YOU trigger ('audioctl hub pair'), and still
#  requires the normal PIN/confirmation -- there is no blind auto-accept.
#  Network audio stays OFF unless you both set NET_TCP=yes AND list explicit
#  addresses in NET_ACL. Never widen NET_ACL to the whole internet.
HUB_MODE=no

# Which users may use the hub: members of this group. The hub runs per-user for
# every logged-in member; users outside the group are ignored entirely, so hub
# mode never touches their sessions. Create it once:  groupadd audiohub
# then add members:  gpasswd -a <user> audiohub
HUB_GROUP=audiohub

# Who owns the card + the single system-wide Bluetooth adapter. Normally you
# DON'T set this: the first hub member to log in automatically becomes the owner
# (remembered until reboot), and later members are kept from grabbing the shared
# BT device. Set a username here ONLY to pin ownership to a specific user
# regardless of login order, e.g. HUB_OWNER=omen.
HUB_OWNER=

# Bluetooth pairing window length, in seconds, for 'audioctl hub pair'.
BT_PAIR_SECONDS=120

# Network audio in (trusted LAN machines -> this box). OFF unless BOTH are set.
#   NET_TCP=yes         enable it
#   NET_ACL=...         REQUIRED allow-list, e.g. "192.168.1.0/24" or a host.
#                       Empty ACL = refused (never opens to everyone).
#   NET_PORT=4713       TCP port.
# WARNING: clients allowed in can also see this box's microphone/monitors.
NET_TCP=no
NET_ACL=
NET_PORT=4713

# Mirror playback to several outputs at once (e.g. internal + a BT speaker).
# When enabled, 'hub_combined' is created AND made the default sink, so anything
# you play goes to all chosen outputs automatically.
#   COMBINE=yes                 create + default the combine sink
#   COMBINE_SLAVES=             empty = ALL current sinks (Speaker, HDMI, BT).
#                               HDMI is included on purpose (gamers/AV want it).
#   COMBINE_SLAVES=a,b          restrict to specific pactl sink names, e.g.
#                               ...HiFi__Speaker__sink,bluez_output.XX_XX_..._1
# Toggle live with:  audioctl hub combine   /   audioctl hub combine off
COMBINE=no
COMBINE_SLAVES=
