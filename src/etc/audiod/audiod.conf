# /etc/audiod/audiod.conf  --  configuration for audiod (the audio session manager)
#
# Simple KEY=value shell syntax. This file is sourced by audiod and audioctl.

# Which audio server this system uses.
#   auto     - detect from /etc/pulse/client.conf (PipeWire when pulseaudio
#              autospawn is off, or when pulseaudio is not installed).
#   pipewire - force PipeWire management on.
#   pulse    - force off; audiod stays idle and audioctl refuses. Use this
#              (or Patrick's pipewire-disable.sh, which auto sets it) to go
#              back to PulseAudio without uninstalling anything.
AUDIO_SERVER=auto

# Manage a per-user D-Bus *session* bus. Desktops (SDDM+Plasma, XFCE, ...)
# start their own via dbus-run-session, and audiod always detects and reuses
# an existing bus wherever it lives (including the /tmp one desktops use) --
# elogind does not track the bus, so audiod inspects the session environment.
#   no  - never spawn one (default). Desktops provide their own; a pure console
#         login runs PipeWire without a session bus, which is fine for basic
#         playback. Recommended for desktop systems (no redundant bus).
#   yes - if, after a short wait, no bus has appeared, spawn one at
#         $XDG_RUNTIME_DIR/bus. Use on console/bare-WM setups that want a
#         session bus for full desktop-less integration.
MANAGE_DBUS=no

# When MANAGE_DBUS=yes: seconds to wait for a concurrently-starting desktop
# bus to appear before spawning our own (avoids a redundant second bus).
BUS_WAIT=3

# Verbose logging to syslog (tag: audiod), and to stderr in foreground.
DEBUG=no

# Seconds to wait, at UserNew, for a valid local seat session to appear
# before deciding the login is not seated (SSH/cron/background -> skipped).
SEAT_WAIT=5

# Seconds to wait for the PipeWire socket to appear before starting the
# services that depend on it (WirePlumber, pipewire-pulse).
PIPEWIRE_WAIT=10
